<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusNav - St. Joseph's College</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>

<nav>
    <a class="brand" href="#navigate">
        <img src="images/clg_logo.png" alt="SJCE">
        <span>St. Joseph's College of Engineering</span>
    </a>

    <button class="menu-toggle" type="button" id="menuToggle" aria-expanded="false" aria-controls="siteNav">
        Menu
    </button>

    <ul class="nav-links" id="siteNav">
        <li><a onclick="goToSection('navigate')" id="nl-navigate" class="active">Navigate</a></li>
        <li><a onclick="goToSection('events')" id="nl-events">Events</a></li>
        <li><a onclick="goToSection('mess')" id="nl-mess">Mess Menu</a></li>
        <li><a href="https://stjosephs.ac.in/index.html" target="_blank" rel="noopener">College Website</a></li>
        <li><a href="./sample.html" target="_blank" rel="noopener">Feedback</a></li>
        <li><button class="dark-btn" type="button" onclick="toggleDark()" id="darkBtn">Dark</button></li>
    </ul>
</nav>

<div class="page">
    <div id="navigate" class="section-anchor">
        <div class="hero">
            <h1>Campus Navigation</h1>
            <p>Find your way around St. Joseph's College of Engineering.</p>
            <div class="nav-row nav-row-top">
                <div>
                    <label for="searchType">Search Type</label>
                    <select id="searchType">
                        <option value="place">Place</option>
                        <option value="event">Event</option>
                    </select>
                </div>
                <div>
                    <label for="destinationFilter">Category Filter</label>
                    <select id="destinationFilter"></select>
                </div>
            </div>
            <div class="nav-row nav-row-bottom">
                <div>
                    <label for="destinationSearch">Search Destination</label>
                    <input type="search" id="destinationSearch" placeholder="Search by name or location">
                </div>
                <div>
                    <label for="destination">Select Destination</label>
                    <select id="destination"></select>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" type="button" onclick="navigateFixed()">Get Directions</button>
                <button class="btn btn-secondary" type="button" onclick="navigateFromMyLocation()">Use My Location</button>
            </div>
            <div id="status-msg"></div>
            <div class="map-wrapper">
                <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1iKBKH4DkuvVAUK7cCleYusi4Dnk2ZEA&ehbc=2E312F" title="Campus Map"></iframe>
            </div>
        </div>
    </div>

    <div id="events" class="section-anchor">
        <div class="section-heading">
            <div class="section-title">Events 2026</div>
        </div>
        <div class="toolbar">
            <div>
                <label for="eventTypeFilter">Event Type</label>
                <select id="eventTypeFilter"></select>
            </div>
            <div>
                <label for="eventSearch">Search Events</label>
                <input type="search" id="eventSearch" placeholder="Search by event name or venue">
            </div>
        </div>
        <div class="events-grid" id="eventsGrid"></div>
        <p class="empty-state hidden" id="eventsEmpty">No events match the current search.</p>
    </div>

    <div id="mess" class="section-anchor">
        <div class="section-title">Weekly Mess Menu</div>
        <div class="mess-section">
            <div class="mess-tabs" id="messTabs"></div>
            <div class="mess-panels" id="messPanels"></div>
        </div>
    </div>
</div>

<footer>&copy; 2026</footer>

<script src="index.js"></script>
</body>
</html>
