<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="sample.css">
</head>
<body>
    <main class="feedback-page">
        <section class="feedback-container">
            <p class="eyebrow">CampusNav Feedback</p>
            <h1>Tell us what to improve</h1>

            <form
                id="feedbackForm"
                action="https://formspree.io/f/xdapzgwn"
                method="POST"
                novalidate
            >
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" placeholder="John" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" placeholder="john13@gmail.com" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="rating">Rating</label>
                    <select id="rating" name="rating" required>
                        <option value="">Select a rating</option>
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Good</option>
                        <option value="3">3 - Average</option>
                        <option value="2">2 - Needs work</option>
                        <option value="1">1 - Poor</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="comments">Comments</label>
                    <textarea id="comments" placeholder="Suggestions..." name="comments" rows="5" required></textarea>
                </div>

                <input type="hidden" name="_subject" value="CampusNav Feedback">

                <button type="submit" id="submitBtn">Submit Feedback</button>
                <p class="form-status" id="formStatus" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="sample.js"></script>
</body>
</html>
